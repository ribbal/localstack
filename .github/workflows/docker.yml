name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Build Dependencies
        run: python -m pip install --upgrade setuptools setuptools_scm

      - name: Build Docker Image
        shell: bash
        working-directory: localstack-core
        env:
          DOCKER_BUILD_FLAGS: "--load"
          PLATFORM: amd64
          DOCKERFILE: ../Dockerfile
          DOCKER_BUILD_CONTEXT: ..
          IMAGE_NAME: "ghcr.io/${{ github.repository }}"
        run: ../bin/docker-helper.sh build

      - name: Determine Version
        id: version
        run: echo "VERSION=$(python3 -m setuptools_scm)" >> $GITHUB_OUTPUT

      - name: Tag Image
        run: |
          docker tag \
           ghcr.io/${{ github.repository }}:latest \
           ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
